<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Microphone body -->
  <rect x="13" y="8" width="6" height="10" rx="3" fill="url(#grad)"/>
  <!-- Microphone arc -->
  <path d="M 10 17 Q 10 22 16 22 Q 22 22 22 17" stroke="url(#grad)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Microphone stand -->
  <line x1="16" y1="22" x2="16" y2="26" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="12" y1="26" x2="20" y2="26" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Broadcast waves -->
  <path d="M 8 14 Q 7 16 8 18" stroke="url(#grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 24 14 Q 25 16 24 18" stroke="url(#grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 5 12 Q 4 16 5 20" stroke="url(#grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 27 12 Q 28 16 27 20" stroke="url(#grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
