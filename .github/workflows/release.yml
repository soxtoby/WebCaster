name: Release

on: workflow_dispatch

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun compile

      - name: Create executable hash
        shell: pwsh
        run: |
          $hash = (Get-FileHash out/WebCaster.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path out/WebCaster.exe.sha256 -Value "$hash  WebCaster.exe"

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Extract release notes
        id: notes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $escapedVersion = [regex]::Escape($version)
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ims)^##\s+v?$escapedVersion\s*$\r?\n(.*?)(?=^##\s+v?\d|\z)"

          if ($content -match $pattern) {
            $notes = $matches[1].Trim()
          } else {
            $notes = ''
          }

          if ([string]::IsNullOrWhiteSpace($notes)) {
            Write-Error "CHANGELOG.md has no release notes for version $version"
            exit 1
          }

          # Write to file to avoid escaping issues
          Set-Content -Path release-notes.txt -Value $notes

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ steps.version.outputs.tag }}
          out/WebCaster.exe
          out/WebCaster.exe.sha256
          --title "${{ steps.version.outputs.tag }}"
          --notes-file release-notes.txt
